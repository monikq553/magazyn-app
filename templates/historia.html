{% extends "base.html" %}

{% block content %}

<h2>Historia</h2>

{% for day, docs in days.items() %}
<div style="background:white;padding:15px;margin-bottom:15px;border-radius:10px;">
    <b>{{ day }}</b>

    {% for d in docs %}
    <div style="margin-top:5px;">
        {{ d[5] }} — {{ d[2] }}
    </div>
    {% endfor %}
</div>
{% endfor %}

{% endblock %}
