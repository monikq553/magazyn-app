{% extends "base.html" %}

{% block content %}

<h2>📄 Dokument {{ doc[5] }}</h2>

<div style="margin-bottom:20px;color:#6b7280;">
    Kontrahent: {{ doc[2] }}<br>
    Data: {{ doc[1] }}
</div>

<style>
.box {
    background:white;
    padding:20px;
    border-radius:12px;
    border:1px solid #e5e7eb;
}

.row {
    display:flex;
    justify-content:space-between;
    padding:10px 0;
    border-bottom:1px solid #eee;
}
</style>

<div class="box">

{% for item in items %}
<div class="row">
    <span>{{ item[0] }}</span>
    <span>{{ item[1] }}</span>
</div>
{% endfor %}

</div>

{% endblock %}
