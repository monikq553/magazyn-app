<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Magazyn</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #f5f7fb;
    color: #1f2937;
}

/* 🔥 LAYOUT */
.layout {
    display: flex;
    min-height: 100vh;
}

/* 🔥 SIDEBAR */
.sidebar {
    width: 220px;
    background: white;
    border-right: 1px solid #e5e7eb;
    padding: 20px;
}

.logo {
    font-weight: 600;
    font-size: 18px;
    margin-bottom: 30px;
}

/* MENU */
.nav a {
    display: block;
    padding: 10px 14px;
    border-radius: 10px;
    text-decoration: none;
    color: #6b7280;
    margin-bottom: 6px;
    font-size: 14px;
    transition: 0.2s;
}

.nav a:hover {
    background: #f3f4f6;
    color: #111827;
}

/* 🔥 ACTIVE */
.nav a.active {
    background: #eef2ff;
    color: #4338ca;
    font-weight: 500;
}

/* 🔥 MAIN */
.main {
    flex: 1;
}

/* TOPBAR */
.topbar {
    background: white;
    padding: 16px 30px;
    border-bottom: 1px solid #e5e7eb;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* CONTENT */
.container {
    padding: 30px;
    max-width: 1200px;
}

/* CARD */
.card {
    background: white;
    border-radius: 16px;
    padding: 20px;
    border: 1px solid #e5e7eb;
}

/* BUTTON */
button {
    background: #4f46e5;
    color: white;
    border: none;
    padding: 10px 14px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 14px;
}

button:hover {
    background: #4338ca;
}

/* INPUT */
input, select {
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #e5e7eb;
    font-size: 14px;
}

input:focus {
    border-color: #4f46e5;
    outline: none;
}

/* BACK BUTTON */
.back {
    background: none;
    border: none;
    color: #6b7280;
    cursor: pointer;
    margin-bottom: 15px;
}
</style>

</head>

<body>

<div class="layout">

    <!-- 🔥 SIDEBAR -->
    <div class="sidebar">
        <div class="logo">📦 MAGAZYN</div>

        <div class="nav">
            <a href="/">Start</a>
            <a href="/dashboard">Dashboard</a>
            <a href="/magazyny">Magazyny</a>
            <a href="/przyjecie">Przyjęcie</a>
            <a href="/wydanie">Wydanie</a>
            <a href="/historia">Historia</a>
            <a href="/users">Użytkownicy</a>
            <a href="/logout">Wyloguj</a>
        </div>
    </div>

    <!-- 🔥 MAIN -->
    <div class="main">

        <div class="topbar">
            <div>Panel magazynowy</div>
        </div>

        <div class="container">

            <button class="back" onclick="goBack()">← Wróć</button>

            {% block content %}{% endblock %}

        </div>

    </div>

</div>

<script>
function goBack() {
    window.history.back();
}
</script>

</body>
</html>
