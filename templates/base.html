<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Magazyn</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: 'Inter', sans-serif;

    background: linear-gradient(135deg, #0f172a 0%, #111827 100%);
    color: #e5e7eb;
}
}

/* 🔝 TOPBAR */
.topbar {
    background: rgba(17, 24, 39, 0.8);
    backdrop-filter: blur(8px);
    padding: 16px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #1f2937;
}

.logo {
    font-weight: 600;
    font-size: 18px;
}

/* MENU */
.menu a {
    margin-left: 20px;
    text-decoration: none;
    color: #9ca3af;
    font-size: 14px;
    transition: 0.2s;
}

.menu a:hover {
    color: #ffffff;
}

/* CONTENT */
.container {
    padding: 30px;
}

/* 🔥 KAFELKI (NOWE) */
.tiles {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
}

.tile {
    background: rgba(31, 41, 55, 0.7);
    backdrop-filter: blur(8px);
    border-radius: 16px;
    padding: 30px;
    border: 1px solid #374151;
    text-decoration: none;
    color: #f9fafb;
    transition: 0.25s;
}

.tile:hover {
    transform: translateY(-6px) scale(1.01);
    box-shadow: 0 15px 35px rgba(0,0,0,0.4);
}

/* KARTY */
.card {
    background: rgba(31, 41, 55, 0.8);
    border-radius: 14px;
    padding: 20px;
    border: 1px solid #374151;
}

.card:hover {
    box-shadow: 0 6px 20px rgba(0,0,0,0.04);
}

/* BUTTON */
button {
    background: #6c5ce7;
    color: white;
    border: none;
    padding: 10px 14px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 14px;
}

button:hover {
    background: #5a4bd6;
}

}

/* DELETE */
.btn-danger {
    background: #ef4444;
}

/* INPUT */
input, select {
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #374151;
    font-size: 14px;
    background: #111827;
    color: #e5e7eb;
}

input:focus {
    border-color: #6c5ce7;
    outline: none;
}
</style>

</head>

<body>

<div class="topbar">
    <div class="logo">📦 MAGAZYN</div>

    <div class="menu">
        <a href="/">Start</a>
        <a href="/magazyny">Magazyny</a>
        <a href="/przyjecie">Przyjęcie</a>
        <a href="/wydanie">Wydanie</a>
        <a href="/historia">Historia</a>
        <a href="/users">Użytkownicy</a>
        <a href="/logout">Wyloguj</a>
    </div>
</div>

<div class="container">

<div style="margin-bottom:20px;">
    <button onclick="goBack()" style="
        background:none;
        border:none;
        color:#6b7280;
        cursor:pointer;
        font-size:14px;
    ">
        ← Wróć
    </button>
</div>

{% block content %}{% endblock %}

</div>

<script>
function goBack() {
    window.history.back();
}
</script>

</body>
</html>
