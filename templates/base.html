<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Magazyn</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #f1f5fb;
    color: #1f2937;
}

.layout {
    display: flex;
    min-height: 100vh;
}

.sidebar {
    width: 250px;
    background: #1d4ed8;
    color: #dbeafe;
    border-right: 1px solid #1e40af;
    padding: 24px 16px;
}

.logo {
    font-weight: 700;
    font-size: 20px;
    margin-bottom: 24px;
    color: #ffffff;
}

.nav a {
    display: block;
    padding: 10px 12px;
    border-radius: 8px;
    text-decoration: none;
    color: #dbeafe;
    margin-bottom: 6px;
    font-size: 14px;
    transition: 0.2s ease;
    border: 1px solid transparent;
}

.nav a:hover {
    background: #2563eb;
    color: #ffffff;
    border-color: #3b82f6;
}

.nav a.active {
    background: #ffffff;
    color: #1d4ed8;
    font-weight: 600;
}

.main {
    flex: 1;
    display: flex;
    flex-direction: column;
}

.topbar {
    background: white;
    padding: 14px 24px;
    border-bottom: 1px solid #e5e7eb;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 1px 0 rgba(15, 23, 42, 0.03);
}

.container {
    padding: 24px;
    max-width: 1280px;
    width: 100%;
    margin: 0 auto;
}

.card {
    background: white;
    border-radius: 12px;
    padding: 18px;
    border: 1px solid #e5e7eb;
    box-shadow: 0 10px 24px rgba(15, 23, 42, 0.04);
}

button {
    background: #2563eb;
    color: white;
    border: none;
    padding: 10px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
}

button:hover {
    background: #1d4ed8;
}

input, select {
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #d1d5db;
    font-size: 14px;
    background: #ffffff;
}

input:focus {
    border-color: #2563eb;
    outline: none;
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
}

.back {
    background: #ffffff;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    padding: 7px 10px;
    color: #334155;
    cursor: pointer;
    margin-bottom: 16px;
    font-weight: 500;
}

.tiles {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
    gap: 14px;
}

.tile {
    background: #ffffff;
    border: 1px solid #e5e7eb;
    border-radius: 12px;
    padding: 16px;
    text-decoration: none;
    color: #1f2937;
    box-shadow: 0 8px 18px rgba(15, 23, 42, 0.04);
    transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease;
}

.tile:hover {
    transform: translateY(-2px);
    border-color: #93c5fd;
    box-shadow: 0 14px 26px rgba(37, 99, 235, 0.12);
}
</style>

</head>

<body>

<div class="layout">

    <!-- 🔥 SIDEBAR -->
    <div class="sidebar">
        <div class="logo">📘 Magazyn</div>

        <div class="nav">
            <a href="/">Start</a>
            <a href="/dashboard">Dashboard</a>
            <a href="/magazyny">Magazyny</a>
            <a href="/przyjecie">Przyjęcie</a>
            <a href="/wydanie">Wydanie</a>
            <a href="/inwestycja-suwaj">Inwestycja Suwaj</a>
            <a href="/historia">Historia</a>
            <a href="/users">Użytkownicy</a>
            <a href="/logout">Wyloguj</a>
        </div>
    </div>

    <!-- 🔥 MAIN -->
    <div class="main">

        <div class="topbar">
            <div>Panel magazynowy</div>
        </div>

        <div class="container">

            <button class="back" onclick="goBack()">← Wróć</button>

            {% block content %}{% endblock %}

        </div>

    </div>

</div>

<script>
function goBack() {
    window.history.back();
}
</script>

</body>
</html>
