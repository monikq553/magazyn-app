<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Magazyn</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #f9fafc 0%, #eef2f7 100%);
    color: #1f2937;
}

/* 🔝 TOPBAR */
.topbar {
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(8px);
    padding: 16px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #e5e7eb;
}

.logo {
    font-weight: 600;
    font-size: 18px;
}

/* MENU */
.menu a {
    margin-left: 20px;
    text-decoration: none;
    color: #6b7280;
    font-size: 14px;
    transition: 0.2s;
}

.menu a:hover {
    color: #111827;
}

/* CONTENT */
.container {
    padding: 30px;
    max-width: 1200px;
    margin: auto;
}

/* 🔥 KAFELKI */
.tiles {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
}

.tile {
    background: white;
    border-radius: 18px;
    padding: 28px;
    border: 1px solid #eef0f4;
    text-decoration: none;
    color: #111827;
    transition: 0.25s;
}

.tile:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.06);
}

/* KARTY */
.card {
    background: white;
    border-radius: 16px;
    padding: 20px;
    border: 1px solid #eef0f4;
}

/* BUTTON */
button {
    background: #6c5ce7;
    color: white;
    border: none;
    padding: 10px 16px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 14px;
}

button:hover {
    background: #5a4bd6;
}

/* DELETE */
.btn-danger {
    background: #ef4444;
}

/* INPUT */
input, select {
    padding: 10px;
    border-radius: 12px;
    border: 1px solid #e5e7eb;
    font-size: 14px;
}

input:focus {
    border-color: #6c5ce7;
    outline: none;
}
</style>

</head>

<body>

<div class="topbar">
    <div class="logo">📦 MAGAZYN</div>

    <div class="menu">
        <a href="/">Start</a>
        <a href="/magazyny">Magazyny</a>
        <a href="/przyjecie">Przyjęcie</a>
        <a href="/wydanie">Wydanie</a>
        <a href="/historia">Historia</a>
        <a href="/dashboard">Dashboard</a>
        <a href="/users">Użytkownicy</a>
        <a href="/logout">Wyloguj</a>
    </div>
</div>

<div class="container">

<div style="margin-bottom:20px;">
    <button onclick="goBack()" style="
        background:none;
        border:none;
        color:#6b7280;
        cursor:pointer;
        font-size:14px;
    ">
        ← Wróć
    </button>
</div>

{% block content %}{% endblock %}

</div>

<script>
function goBack() {
    window.history.back();
}
</script>

</body>
</html>
