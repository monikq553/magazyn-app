{% extends "base.html" %}

{% block content %}

<h2 style="margin-bottom:25px;">Dashboard</h2>

<style>
.stats {
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
    gap:20px;
    margin-bottom:30px;
}

.stat {
    background:white;
    padding:20px;
    border-radius:16px;
    border:1px solid #eef0f4;
}

.stat-title {
    font-size:13px;
    color:#6b7280;
}

.stat-value {
    font-size:28px;
    font-weight:600;
    margin-top:5px;
}

.card {
    background:white;
    padding:20px;
    border-radius:16px;
    border:1px solid #eef0f4;
}
</style>

<div class="stats">

<div class="stat">
    <div class="stat-title">Produkty</div>
    <div class="stat-value">{{ total_products }}</div>
</div>

<div class="stat">
    <div class="stat-title">Ilość łączna</div>
    <div class="stat-value">{{ total_qty }}</div>
</div>

</div>

<div class="card">
    <canvas id="chart" height="100"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
new Chart(document.getElementById('chart'), {
    type: 'bar',
    data: {
        labels: {{ names | safe }},
        datasets: [{
            label: 'Największe stany',
            data: {{ qtys | safe }}
        }]
    }
});
</script>

{% endblock %}
