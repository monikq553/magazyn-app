{% extends "base.html" %}

{% block content %}

<h2 style="margin-bottom:20px;">Użytkownicy</h2>

<style>
.user {
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:white;
    padding:15px 18px;
    border-radius:14px;
    border:1px solid #eef0f4;
    margin-bottom:10px;
}

.role {
    font-size:12px;
    color:#6b7280;
}

.actions {
    display:flex;
    gap:10px;
}

input, select {
    padding:8px;
    border-radius:10px;
    border:1px solid #e5e7eb;
}

.btn {
    background:#FFC067;
    color:#422d00;
    border:none;
    padding:8px 12px;
    border-radius:10px;
    cursor:pointer;
}

.delete {
    background:#ef4444;
}
</style>

<!-- ➕ DODAWANIE -->
<div class="card" style="margin-bottom:20px;">
    <form method="POST" action="/add_user" style="display:flex; gap:10px; flex-wrap:wrap;">
        <input name="username" placeholder="Login" required>
        <input name="password" placeholder="Hasło" required>
        
        <select name="role">
            <option value="user">User</option>
            <option value="admin">Admin</option>
        </select>

        <button class="btn">Dodaj</button>
    </form>
</div>

<!-- 📋 LISTA -->
{% for u in users %}
<div class="user">

    <div>
        <strong>{{u[1]}}</strong>
        <div class="role">{{u[2]}}</div>
    </div>

    <div class="actions">

        {% if u[0] != 1 %}
        <form method="POST" action="/delete_user/{{u[0]}}">
            <button class="btn delete" onclick="return confirm('Usunąć użytkownika?')">
                Usuń
            </button>
        </form>
        {% endif %}

    </div>

</div>
{% endfor %}

{% endblock %}
