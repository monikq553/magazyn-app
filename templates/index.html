{% extends "base.html" %}

{% block content %}

<style>
.box {
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 4px 10px rgba(0,0,0,0.05);
    max-width:900px;
    margin:auto;
}

h2 { margin-bottom:20px; }

table {
    width:100%;
    border-collapse:collapse;
}

th {
    background:#f1f2f6;
    padding:12px;
    text-align:left;
}

td {
    padding:12px;
    border-bottom:1px solid #eee;
}

tr:hover { background:#fafafa; }

.btn {
    background:#6c5ce7;
    color:white;
    padding:6px 10px;
    border-radius:6px;
    border:none;
    cursor:pointer;
    font-size:13px;
}

input {
    width:100%;
    padding:6px;
    border-radius:6px;
    border:1px solid #ddd;
}

.search {
    margin-bottom:5px;
}

#suggestions div {
    padding:8px;
    cursor:pointer;
}

#suggestions div:hover {
    background:#f1f2f6;
}
</style>

<div class="box">
<h2>📦 Magazyn: {{warehouse}}</h2>

<!-- 🔍 WYSZUKIWARKA -->
<div style="position:relative;">
    <input type="text" id="search" class="search" placeholder="🔍 Szukaj produktu..." onkeyup="showSuggestions()">

    <div id="suggestions" style="
        position:absolute;
        background:white;
        width:100%;
        border:1px solid #ddd;
        border-radius:8px;
        display:none;
        max-height:200px;
        overflow:auto;
        z-index:10;
    "></div>
</div>

<form method="POST" action="/delete_selected">

<table id="productsTable">
<tr>
<th><input type="checkbox" onclick="toggleAll(this)"></th>
<th>Nazwa</th>
<th>Ilość</th>
<th>Jedn.</th>
<th>Brutto</th>
<th>Akcja</th>
</tr>

{% for p in products %}
<tr>

<td>
    <input type="checkbox" name="selected" value="{{p[0]}}">
</td>

<td>
    <span class="product-name"
    onclick="showPackages(event, {{p[0]}}, '{{warehouse}}')"
    style="cursor:pointer;">
    {{p[1]}}
    </span>
</td>

<td>{{p[2]}}</td>
<td>{{p[3]}}</td>
<td>{{ (p[5]*(1+p[6]/100))|round(2) }} zł</td>

<td style="display:flex; gap:5px;">
    <button type="button" class="btn" style="background:red;" onclick="deleteOne({{p[0]}})">🗑</button>
</td>

</tr>
{% endfor %}
</table>

<button class="btn" style="background:red; margin-top:10px;">
🗑 Usuń zaznaczone
</button>

</form>
</div>

<!-- 🔥 MODAL PACZEK -->
<div id="packagesModal" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
z-index:1000;
justify-content:center;
align-items:center;
" onclick="closePackages()">

<div onclick="event.stopPropagation()" style="
background:white;
width:400px;
max-height:80%;
overflow:auto;
border-radius:12px;
padding:20px;
">

<div id="packagesContent">Ładowanie...</div>

</div>
</div>

<script>
function deleteOne(id) {
    if (!confirm("Usunąć produkt?")) return;

    fetch("/delete_product/" + id, {method: "POST"})
    .then(() => location.reload());
}

function toggleAll(source) {
    document.querySelectorAll("input[name='selected']")
        .forEach(cb => cb.checked = source.checked);
}

function showSuggestions() {
    let input = document.getElementById("search");
    let filter = input.value.toLowerCase();
    let box = document.getElementById("suggestions");
    box.innerHTML = "";

    if (!filter) {
        box.style.display = "none";
        filterTable();
        return;
    }

    let names = document.querySelectorAll(".product-name");
    let used = new Set();

    names.forEach(n => {
        let val = n.innerText;

        if (val.toLowerCase().includes(filter) && !used.has(val)) {
            used.add(val);

            let div = document.createElement("div");
            div.innerText = val;

            div.onclick = () => {
                input.value = val;
                box.style.display = "none";
                filterTable();
            };

            box.appendChild(div);
        }
    });

    box.style.display = "block";
}

function filterTable() {
    let filter = document.getElementById("search").value.toLowerCase();
    let rows = document.querySelectorAll("#productsTable tr");

    rows.forEach((row, i) => {
        if (i === 0) return;
        row.style.display = row.innerText.toLowerCase().includes(filter) ? "" : "none";
    });
}

function showPackages(e, productId, warehouse) {
    e.stopPropagation();

    if (warehouse !== "Drewno") return;

    fetch('/packages/' + productId)
    .then(res => res.text())
    .then(html => {
        document.getElementById("packagesContent").innerHTML = html;
        document.getElementById("packagesModal").style.display = "flex";
    });
}

function closePackages() {
    document.getElementById("packagesModal").style.display = "none";
}
</script>

{% endblock %}
