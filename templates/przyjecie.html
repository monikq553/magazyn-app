{% extends "base.html" %}

{% block content %}

<style>
.box {
    background:white;
    padding:25px;
    border-radius:12px;
    border:1px solid #e5e7eb;
    box-shadow:0 12px 24px rgba(15,23,42,0.05);
    max-width:900px;
}

input, select {
    padding:10px;
    border-radius:8px;
    border:1px solid #d1d5db;
    width:100%;
    margin-bottom:10px;
}

button {
    background:#2563eb;
    color:white;
    border:none;
    padding:10px 14px;
    border-radius:10px;
    cursor:pointer;
}

.add { background:#0ea5e9; }

.item {
    padding:15px;
    background:#f8fbff;
    border-radius:10px;
    border:1px solid #e2e8f0;
    margin-bottom:12px;
}

.info {
    font-size:13px;
    color:#666;
    margin-bottom:5px;
}

.suggestions div {
    padding:8px;
    cursor:pointer;
}

.suggestions div:hover {
    background:#f1f5f9;
}
</style>

<div class="box">

<h2>{{ page_title or "📥 Przyjęcie (PZ)" }}</h2>

<form method="POST" action="{{ form_action or '/receive_doc' }}">

<!-- 🔥 DOKUMENT -->
<input name="doc_number" placeholder="Numer dokumentu (np. PZ/01)">
<input type="date" name="date">
<input name="kontrahent" placeholder="Dostawca">

<hr>

<h3>Pozycje</h3>

<div id="items">

<div class="item">

<!-- 🔍 PRODUKT -->
<div style="position:relative;">
    <input type="text" placeholder="Produkt..."
    onkeyup="searchProduct(this)"
    class="product-input">

    <input type="hidden" name="product_id">

    <div class="suggestions" style="
        position:absolute;
        background:white;
        width:100%;
        border:1px solid #ddd;
        border-radius:8px;
        display:none;
        max-height:150px;
        overflow:auto;
        z-index:10;
    "></div>
</div>

<div class="info"></div>

<!-- 🔥 MAGAZYN -->
{% if forced_warehouse %}
<input type="hidden" name="warehouse" value="{{ forced_warehouse }}">
<input value="{{ forced_warehouse }}" disabled>
{% else %}
<select name="warehouse">
<option>Drewno</option>
<option>Farby</option>
<option>Śruby i wkręty</option>
<option>Pellet</option>
<option>Inne</option>
</select>
{% endif %}

<!-- 🔥 NUMER PACZKI -->
<input name="package_number" placeholder="Numer paczki (np. PZ-001)">

<!-- 🔥 ILOŚĆ -->
<input name="qty" placeholder="Ilość">

<!-- 🔥 JEDNOSTKA -->
<select name="unit">
<option>m2</option>
<option>m3</option>
<option>szt</option>
<option>l</option>
<option>opak</option>
</select>

<button type="button" onclick="removeItem(this)" style="background:red;">Usuń</button>

</div>

</div>

<button type="button" class="add" onclick="addItem()">Dodaj pozycję</button>

<hr>

<button>Dodaj do magazynu</button>

</form>

</div>

<script>
const PRODUCTS = [
{% for p in products %}
{ id: {{p[0]}}, name: "{{p[1]}}", qty: "{{p[2]}}", unit: "{{p[3]}}", warehouse: "{{p[4]}}" },
{% endfor %}
];

// 🔍 SZUKANIE PRODUKTU
function searchProduct(input) {
    let value = input.value.toLowerCase();
    let box = input.parentElement.querySelector(".suggestions");
    let hidden = input.parentElement.querySelector("input[name='product_id']");
    let info = input.closest(".item").querySelector(".info");

    box.innerHTML = "";

    if (!value) {
        box.style.display = "none";
        hidden.value = "";
        return;
    }

    let found = PRODUCTS.filter(p => p.name.toLowerCase().includes(value));

    found.forEach(p => {
        let div = document.createElement("div");
        div.innerText = p.name + " (" + p.warehouse + ")";

        div.onclick = () => {
            input.value = p.name;
            hidden.value = p.id;

            info.innerHTML = "Stan: " + p.qty + " " + p.unit;

            // 🔥 ustaw magazyn (gdy jest select)
            let warehouseSelect = input.closest(".item").querySelector("select[name='warehouse']");
            if (warehouseSelect) {
                warehouseSelect.value = p.warehouse;
            }

            box.style.display = "none";
        };

        box.appendChild(div);
    });

    box.style.display = "block";
}

// ➕ DODAJ ITEM
function addItem() {
    let div = document.createElement("div");
    div.classList.add("item");
    div.innerHTML = document.querySelector(".item").innerHTML;
    document.getElementById("items").appendChild(div);
}

// ❌ USUŃ ITEM
function removeItem(btn) {
    btn.parentElement.remove();
}
</script>

{% endblock %}
