{% extends "base.html" %}

{% block content %}

<style>
.box {
    background:white;
    padding:25px;
    border-radius:14px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
    max-width:900px;
}

input, select {
    padding:10px;
    border-radius:10px;
    border:1px solid #ddd;
    width:100%;
    margin-bottom:10px;
    font-size:14px;
}

button {
    background:#111827;
    color:white;
    border:none;
    padding:10px 14px;
    border-radius:10px;
    cursor:pointer;
}

.add { background:#00b894; }

.item {
    padding:15px;
    background:#f8fafc;
    border-radius:12px;
    margin-bottom:12px;
    border:1px solid #eee;
}

.info {
    font-size:13px;
    color:#666;
}

.suggestions div {
    padding:8px;
    cursor:pointer;
}

.suggestions div:hover {
    background:#f1f5f9;
}
</style>

<div class="box">

<h2>📄 Wydanie (WZ)</h2>

<form method="POST" action="/issue_doc">

<input name="kontrahent" placeholder="Kontrahent">

<hr>

<h3>Pozycje</h3>

<div id="items">

<div class="item">

<!-- 🔍 PRODUKT -->
<div style="position:relative;">
    <input type="text" placeholder="Produkt..."
    onkeyup="searchProduct(this)"
    class="product-input">

    <input type="hidden" name="product_id">

    <div class="suggestions" style="
        position:absolute;
        background:white;
        width:100%;
        border:1px solid #ddd;
        border-radius:8px;
        display:none;
        max-height:150px;
        overflow:auto;
        z-index:10;
    "></div>
</div>

<div class="info"></div>

<!-- 🔥 MAGAZYN -->
<select name="warehouse">
<option>Drewno</option>
<option>Farby</option>
<option>Śruby i wkręty</option>
<option>Pellet</option>
<option>Inne</option>
</select>

<!-- 🔥 PACZKI -->
<select name="package_id" onchange="showPackageInfo(this)">
<option value="">-- wybierz paczkę --</option>

{% for pkg in packages %}
<option value="{{pkg[0]}}"
        data-product="{{pkg[1]}}"
        data-qty="{{pkg[3]}}">
Paczka {{pkg[2]}} ({{pkg[3]}})
</option>
{% endfor %}
</select>

<div class="info package-info"></div>

<!-- ILOŚĆ -->
<input name="qty" placeholder="Ilość">

<!-- USUŃ -->
<button type="button" onclick="removeItem(this)" style="background:red;">❌</button>

</div>

</div>

<button type="button" class="add" onclick="addItem()">➕ Dodaj pozycję</button>

<hr>

<button>Wydaj</button>

</form>

</div>

<script>
const PRODUCTS = [
{% for p in products %}
{ id: {{p[0]}}, name: "{{p[1]}}", qty: "{{p[2]}}", unit: "{{p[3]}}", warehouse: "{{p[4]}}" },
{% endfor %}
];

function searchProduct(input) {
    let value = input.value.toLowerCase();
    let box = input.parentElement.querySelector(".suggestions");
    let hidden = input.parentElement.querySelector("input[name='product_id']");
    let info = input.closest(".item").querySelector(".info");

    box.innerHTML = "";

    if (!value) {
        box.style.display = "none";
        return;
    }

    let found = PRODUCTS.filter(p => p.name.toLowerCase().includes(value));

    found.forEach(p => {
        let div = document.createElement("div");
        div.innerText = p.name + " (" + p.warehouse + ")";

        div.onclick = () => {
            input.value = p.name;
            hidden.value = p.id;

            info.innerHTML = "📦 " + p.qty + " " + p.unit;

            // 🔥 ustaw magazyn
            input.closest(".item").querySelector("select[name='warehouse']").value = p.warehouse;

            // 🔥 filtr paczek
            let pkgSelect = input.closest(".item").querySelector("select[name='package_id']");

            Array.from(pkgSelect.options).forEach(opt => {
                if (!opt.value) return;
                opt.style.display = (opt.dataset.product == p.id) ? "block" : "none";
            });

            box.style.display = "none";
        };

        box.appendChild(div);
    });

    box.style.display = "block";
}

function showPackageInfo(select) {
    let option = select.options[select.selectedIndex];
    let qty = option.dataset.qty || "";

    let info = select.parentElement.querySelector(".package-info");
    info.innerHTML = qty ? "📦 W paczce: " + qty : "";
}

function addItem() {
    let div = document.createElement("div");
    div.classList.add("item");
    div.innerHTML = document.querySelector(".item").innerHTML;
    document.getElementById("items").appendChild(div);
}

function removeItem(btn) {
    btn.parentElement.remove();
}
</script>

{% endblock %}
