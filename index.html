{% extends "base.html" %}

{% block content %}

<style>
.box {
    max-width:1000px;
    margin:auto;
}

/* 🔍 SEARCH */
.search {
    width:100%;
    padding:12px;
    border-radius:14px;
    border:1px solid #e5e7eb;
    margin-bottom:20px;
}

/* 📦 LISTA */
.product {
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:white;
    padding:16px 18px;
    border-radius:16px;
    border:1px solid #eef0f4;
    margin-bottom:12px;
    transition:0.2s;
}

.product:hover {
    box-shadow:0 8px 20px rgba(0,0,0,0.05);
}

/* INFO */
.name {
    font-weight:600;
}

.meta {
    font-size:13px;
    color:#6b7280;
    margin-top:4px;
}

/* ACTIONS */
.actions {
    display:flex;
    gap:10px;
}

.btn-small {
    padding:6px 10px;
    border-radius:8px;
    font-size:12px;
}

.delete {
    background:#ef4444;
    color:white;
    border:none;
}

/* CHECKBOX */
.checkbox {
    margin-right:10px;
}
</style>

<div class="box">

<h2 style="margin-bottom:20px;">📦 Magazyn: {{warehouse}}</h2>

<!-- 🔍 SEARCH -->
<input type="text" id="search" class="search" placeholder="🔍 Szukaj produktu..." onkeyup="filterProducts()">

<form method="POST" action="/delete_selected">

{% for p in products %}
<div class="product">

    <div style="display:flex; align-items:center;">

        <input type="checkbox" name="selected" value="{{p[0]}}" class="checkbox">

        <div>
            <div class="name"
                 onclick="showPackages(event, {{p[0]}}, '{{warehouse}}')"
                 style="cursor:pointer;">
                {{p[1]}}
            </div>

            <div class="meta">
                {{p[2]}} {{p[3]}} • {{ (p[5]*(1+p[6]/100))|round(2) }} zł
            </div>
        </div>

    </div>

    <div class="actions">
        <button type="button" class="btn-small delete" onclick="deleteOne({{p[0]}})">
            🗑
        </button>
    </div>

</div>
{% endfor %}

<button class="btn-danger" style="margin-top:15px;">
🗑 Usuń zaznaczone
</button>

</form>

</div>

<!-- 📦 MODAL PACZEK -->
<div id="packagesModal" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
z-index:1000;
justify-content:center;
align-items:center;
" onclick="closePackages()">

<div onclick="event.stopPropagation()" style="
background:white;
width:400px;
max-height:80%;
overflow:auto;
border-radius:16px;
padding:20px;
">

<div id="packagesContent">Ładowanie...</div>

</div>
</div>

<script>
function deleteOne(id) {
    if (!confirm("Usunąć produkt?")) return;

    fetch("/delete_product/" + id, {method: "POST"})
    .then(() => location.reload());
}

function filterProducts() {
    let filter = document.getElementById("search").value.toLowerCase();
    let items = document.querySelectorAll(".product");

    items.forEach(el => {
        el.style.display = el.innerText.toLowerCase().includes(filter) ? "" : "none";
    });
}

function showPackages(e, productId, warehouse) {
    e.stopPropagation();

    if (warehouse !== "Drewno") return;

    fetch('/packages/' + productId)
    .then(res => res.text())
    .then(html => {
        document.getElementById("packagesContent").innerHTML = html;
        document.getElementById("packagesModal").style.display = "flex";
    });
}

function closePackages() {
    document.getElementById("packagesModal").style.display = "none";
}
</script>

{% endblock %}
